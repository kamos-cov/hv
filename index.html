			 file_de: "top8_10/Covestro_Zusammengefasster_Lagebericht_2025.pdf?t=${timestamp}#page=1&zoom=100",
			 file_en: "top8_10/Covestro_Combined_Management_Report_2025.pdf?t=${timestamp}#page=1&zoom=100",
			 pages_de: 201,
        	 pages_en: 188
           },
		   { id: "top8k",
			 de: "Übertragungsbericht XRG P.J.S.C.",
			 en: "Transfer Report XRG P.J.S.C.",
			 file_de: "top8_11/Covestro_HV2026_Uebertragungsbericht.pdf?t=${timestamp}#page=1&zoom=100",
			 file_en: "top8_11/Covestro_AGM_2026_Transfer_Report.pdf?t=${timestamp}#page=1&zoom=100",
             pages_de: 253,
             pages_en: 222
           },
           { id: "top8l",
			 de: "Bericht des gerichtlich bestellten sachverständigen Prüfers IVA VALUATION & ADVISORY AG, Wirtschaftsprüfungsgesellschaft",
			 en: "Report of the court-appointed expert auditor IVA VALUATION & ADVISORY AG, Wirtschaftsprüfungsgesellschaft",
			 file_de: "top8_12/Covestro_HV_20262_IVA-Pruefungsbericht.pdf?t=${timestamp}#page=1&zoom=100",
			 file_en: "top8_12/Covestro AG_IVA-Audit_Report.pdf?t=${timestamp}#page=1&zoom=100",
             pages_de: 228,
             pages_en: 218
           },
        ]
      }
    ];

    const timestamp = new Date().getTime();

    let currentMode = 0;
    let currentLang = 'de';
    let lastFocus= null;

    function setMode(mode) {
      currentMode = mode;
      document.body.classList.remove('low-vision', 'color-blind');
      if (currentMode === 1) document.body.classList.add('low-vision');
      if (currentMode === 2) document.body.classList.add('color-blind');

      document.getElementById('btn-normal').classList.toggle('active', mode === 0);
      document.getElementById('btn-lv').classList.toggle('active', mode === 1);
      document.getElementById('btn-cb').classList.toggle('active', mode === 2);
      document.getElementById('btn-normal').setAttribute('aria-pressed', mode === 0 ? 'true' : 'false');
      document.getElementById('btn-lv').setAttribute('aria-pressed', mode === 1 ? 'true' : 'false');
      document.getElementById('btn-cb').setAttribute('aria-pressed', mode === 2 ? 'true' : 'false');

      const t = i18n[currentLang];
      const toasts = [t.toastNormal, t.toastLV, t.toastCB];
      showToast(toasts[mode]);
      localStorage.setItem('a11y-mode', mode);
    }

    function showToast(msg) {
      const toast = document.getElementById('lv-toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2500);
    }
<!--
    function getMetaText(pages, t) {
      if (pages === null || pages === undefined) return t.unknown;
      if (typeof pages === 'string' && pages.startsWith('approx:')) {
        return t.approxPages + ' ' + pages.split(':')[1] + ' ' + t.pages;
      }
      return pages + ' ' + t.pages;
    }
-->
	function getMetaText(doc, t) {
	  const pages = doc['pages_' + currentLang] !== undefined
		? doc['pages_' + currentLang]
		: doc.pages;
	  if (pages === null || pages === undefined) return t.unknown;
	  if (typeof pages === 'string' && pages.startsWith('approx:')) {
		return t.approxPages + ' ' + pages.split(':')[1] + ' ' + t.pages;
	  }
	  return pages + ' ' + t.pages;
	}



    function createDocRow(doc, t, isSub) {
      const file     = doc['file_' + currentLang] || doc.file;
      <!-- const metaText = getMetaText(doc.pages, t); -->
      const metaText = getMetaText(doc, t);
      const label    = t.openDoc + doc[currentLang] + ', ' + metaText;
      const row      = document.createElement('button');
      row.className  = 'doc-row';
      row.setAttribute('aria-label', label);
      row.setAttribute('type', 'button');
      if (isSub) row.style.paddingLeft = '36px';
      row.innerHTML =
        '<div class="doc-icon" aria-hidden="true">' +
          '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
            '<path d="M6 2C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20' +
                     'V8L14 2H6ZM13 3.5L18.5 9H13V3.5ZM8 13H16V15H8V13Z' +
                     'M8 9H11V11H8V9ZM8 17H16V19H8V17Z"/>' +
          '</svg>' +
        '</div>' +
        '<div class="doc-info">' +
          '<div class="doc-title">' + doc[currentLang] + '</div>' +
          '<div class="doc-meta">'  + metaText + '</div>' +
        '</div>' +
        '<span class="doc-arrow" aria-hidden="true">&#8250;</span>';
      row.addEventListener('click', function() {
        openPDF(file, doc[currentLang], metaText, row);
      });
      return row;
    }

    function renderDocs() {
      const t         = i18n[currentLang];
      const container = document.getElementById('doc-list');
      container.innerHTML = '';
      docs.forEach(function(doc) {
        if (doc.type === 'group') {
          const card = document.createElement('div');
          card.className = 'doc-item';
          card.setAttribute('role', 'listitem');
          const groupHeader = document.createElement('div');
          groupHeader.className = 'doc-group-header';
          groupHeader.setAttribute('role', 'heading');
          groupHeader.setAttribute('aria-level', '3');
          groupHeader.innerHTML =
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" ' +
                 'xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
              '<path d="M3 7C3 5.9 3.9 5 5 5H19C20.1 5 21 5.9 21 7V17C21 18.1 20.1 19 19 ' +
                       '19H5C3.9 19 3 18.1 3 17V7Z" stroke="#007ab8" stroke-width="2"/>' +
              '<path d="M3 9H21" stroke="#007ab8" stroke-width="2"/>' +
            '</svg>' +
            '<span>' + doc[currentLang] + '</span>' +
            '<span class="badge" aria-label="Tagesordnungspunkt 8">📋 TOP 8</span>';
          card.appendChild(groupHeader);
          const subList = document.createElement('div');
          subList.className = 'doc-sub-list';
          subList.setAttribute('role', 'list');
          subList.setAttribute('aria-label', doc[currentLang]);
          doc.children.forEach(function(child) {
            const li = document.createElement('div');
            li.setAttribute('role', 'listitem');
            li.appendChild(createDocRow(child, t, true));
            subList.appendChild(li);
          });
          card.appendChild(subList);
          container.appendChild(card);
        } else {
          const card = document.createElement('div');
          card.className = 'doc-item';
          card.setAttribute('role', 'listitem');
          card.appendChild(createDocRow(doc, t, false));
          container.appendChild(card);
        }
      });
    }

    function setLang(lang) {
      currentLang = lang;
      const t     = i18n[lang];
      document.getElementById('btn-de').setAttribute('aria-pressed', lang === 'de' ? 'true' : 'false');
      document.getElementById('btn-en').setAttribute('aria-pressed', lang === 'en' ? 'true' : 'false');
      document.getElementById('btn-de').classList.toggle('active', lang === 'de');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('header-title').textContent  = t.headerTitle;
      document.getElementById('intro-title').textContent   = t.introTitle;
      document.getElementById('intro-text').textContent    = t.introText;
      document.getElementById('close-label').textContent   = t.closeLabel;
      document.getElementById('footer-event').textContent  = t.footerEvent;
      document.getElementById('footer-rights').textContent = t.footerRights;
      document.getElementById('btn-normal').textContent    = t.btnNormal;
      document.getElementById('btn-lv').textContent        = t.btnLV;
      document.getElementById('btn-cb').textContent        = t.btnCB;
      document.documentElement.lang = lang;
      renderDocs();
    }

    function openPDF(file, title, meta, triggerEl) {
      lastFocus      = triggerEl;
      const overlay  = document.getElementById('pdf-overlay');
      const fallback = document.getElementById('pdf-fallback');
      document.getElementById('pdf-frame').src             = file + '#toolbar=0&page=1';
      document.getElementById('pdf-doc-title').textContent = title;
      document.getElementById('pdf-page-info').textContent = meta;
      if (fallback)fallback.href = file;
      overlay.classList.add('active');
      overlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      document.getElementById('pdf-close-btn').focus();
      overlay.addEventListener('keydown', trapFocus);
    }

    function closePDF() {
      const overlay = document.getElementById('pdf-overlay');
      overlay.classList.remove('active');
      overlay.setAttribute('aria-hidden', 'true');
      document.getElementById('pdf-frame').src = '';
      document.body.style.overflow = '';
      overlay.removeEventListener('keydown', trapFocus);
      if (lastFocus) lastFocus.focus();
    }

    function trapFocus(e) {
      if (e.key !== 'Tab') return;
      const overlay   = document.getElementById('pdf-overlay');
      const focusable = overlay.querySelectorAll(
        'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
      );
      const first = focusable[0];
      const last  = focusable[focusable.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last)  { e.preventDefault(); first.focus(); }
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' &&
          document.getElementById('pdf-overlay').classList.contains('active')) {
        closePDF();
      }
    });

    document.addEventListener('touchstart', function(e) {
	  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });



    (function init() {
      const saved = localStorage.getItem('a11y-mode');
      if (saved !== null) {
        currentMode = parseInt(saved, 10);
        if (currentMode === 1) document.body.classList.add('low-vision');
        if (currentMode === 2) document.body.classList.add('color-blind');
        document.getElementById('btn-normal').classList.toggle('active', currentMode === 0);
        document.getElementById('btn-lv').classList.toggle('active', currentMode === 1);
        document.getElementById('btn-cb').classList.toggle('active', currentMode === 2);
        document.getElementById('btn-normal').setAttribute('aria-pressed', currentMode === 0 ? 'true' : 'false');
        document.getElementById('btn-lv').setAttribute('aria-pressed', currentMode === 1 ? 'true' : 'false');
        document.getElementById('btn-cb').setAttribute('aria-pressed', currentMode === 2 ? 'true' : 'false');
      }
      renderDocs();
    })();

  </script>
